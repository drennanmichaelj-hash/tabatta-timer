<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Tabata Timer</title>
<style>
  :root {
    --bg: #0d1117;
    --panel: #161b22;
    --panel-2: #1c2430;
    --text: #e6edf3;
    --muted: #8b949e;
    --accent: #3fb950;
    --accent-2: #2ea043;
    --break: #58a6ff;
    --rest-glow: rgba(88,166,255,0.25);
    --work-glow: rgba(63,185,80,0.25);
    --danger: #f85149;
    --border: #30363d;
  }

  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 20px;
    transition: background 0.4s ease;
  }

  .screen {
    width: 100%;
    max-width: 460px;
    display: none;
  }
  .screen.active { display: block; }

  h1 {
    text-align: center;
    font-size: 1.8rem;
    margin: 0 0 4px;
    letter-spacing: 0.5px;
  }
  .subtitle {
    text-align: center;
    color: var(--muted);
    margin: 0 0 28px;
    font-size: 0.95rem;
  }

  .card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 22px;
  }

  .field { margin-bottom: 20px; }
  .field:last-child { margin-bottom: 0; }

  label {
    display: block;
    font-size: 0.9rem;
    color: var(--muted);
    margin-bottom: 8px;
    font-weight: 600;
  }

  .input-row {
    display: flex;
    gap: 10px;
  }

  input[type="number"] {
    flex: 1;
    background: var(--panel-2);
    border: 1px solid var(--border);
    color: var(--text);
    font-size: 1.2rem;
    padding: 14px;
    border-radius: 10px;
    width: 100%;
    outline: none;
    transition: border-color 0.2s;
    -moz-appearance: textfield;
  }
  input[type="number"]:focus { border-color: var(--accent); }
  input::-webkit-outer-spin-button,
  input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }

  .unit-toggle {
    display: flex;
    background: var(--panel-2);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
  }
  .unit-toggle button {
    background: transparent;
    border: none;
    color: var(--muted);
    padding: 0 16px;
    font-size: 0.9rem;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.2s, color 0.2s;
  }
  .unit-toggle button.sel {
    background: var(--accent);
    color: #08130b;
  }

  .btn {
    width: 100%;
    border: none;
    border-radius: 12px;
    padding: 18px;
    font-size: 1.1rem;
    font-weight: 700;
    cursor: pointer;
    transition: transform 0.08s, background 0.2s, opacity 0.2s;
    color: #08130b;
    background: var(--accent);
  }
  .btn:active { transform: scale(0.98); }
  .btn.start { margin-top: 24px; }

  .btn-row {
    display: flex;
    gap: 12px;
    margin-top: 28px;
  }
  .btn-secondary {
    background: var(--panel-2);
    color: var(--text);
    border: 1px solid var(--border);
  }
  .btn-danger {
    background: transparent;
    color: var(--danger);
    border: 1px solid var(--danger);
  }

  /* Timer screen */
  #timerScreen .card {
    text-align: center;
    padding: 30px 22px;
  }

  .rotation-badge {
    display: inline-block;
    background: var(--panel-2);
    border: 1px solid var(--border);
    border-radius: 999px;
    padding: 8px 18px;
    font-size: 0.95rem;
    color: var(--muted);
    margin-bottom: 22px;
  }
  .rotation-badge b {
    color: var(--text);
    font-size: 1.1rem;
  }

  .phase-label {
    font-size: 2rem;
    font-weight: 800;
    margin: 0 0 6px;
    letter-spacing: 1px;
    transition: color 0.3s;
  }
  .phase-sub {
    color: var(--muted);
    margin: 0 0 18px;
    font-size: 0.9rem;
    min-height: 1.2em;
  }

  .countdown {
    font-size: 6rem;
    font-weight: 800;
    font-variant-numeric: tabular-nums;
    line-height: 1;
    margin: 10px 0 22px;
    letter-spacing: 2px;
  }

  .progress {
    height: 8px;
    background: var(--panel-2);
    border-radius: 999px;
    overflow: hidden;
    margin-bottom: 6px;
  }
  .progress-bar {
    height: 100%;
    width: 100%;
    background: var(--accent);
    border-radius: 999px;
    transition: width 0.25s linear, background 0.3s;
  }

  /* phase theming */
  body.work .countdown, body.work .phase-label { color: var(--accent); }
  body.break .countdown, body.break .phase-label { color: var(--break); }
  body.work .progress-bar { background: var(--accent); }
  body.break .progress-bar { background: var(--break); }
  body.work .card { box-shadow: 0 0 50px var(--work-glow); }
  body.break .card { box-shadow: 0 0 50px var(--rest-glow); }
  body.paused .countdown { opacity: 0.45; }

  .hint {
    text-align: center;
    color: var(--muted);
    font-size: 0.8rem;
    margin-top: 18px;
    line-height: 1.5;
  }

  @media (max-width: 380px) {
    .countdown { font-size: 4.5rem; }
    .phase-label { font-size: 1.6rem; }
  }
</style>
</head>
<body>

  <!-- SETUP SCREEN -->
  <div id="setupScreen" class="screen active">
    <h1>Tabata Timer</h1>
    <p class="subtitle">Set it up, hit start, keep moving.</p>
    <div class="card">
      <div class="field">
        <label for="numWorkouts">Workouts per rotation</label>
        <div class="input-row">
          <input type="number" id="numWorkouts" min="1" step="1" value="3" inputmode="numeric">
        </div>
      </div>

      <div class="field">
        <label for="workDur">Workout duration</label>
        <div class="input-row">
          <input type="number" id="workDur" min="1" step="1" value="30" inputmode="numeric">
          <div class="unit-toggle" id="workUnit">
            <button data-unit="sec" class="sel">sec</button>
            <button data-unit="min">min</button>
          </div>
        </div>
      </div>

      <div class="field">
        <label for="breakDur">Break duration</label>
        <div class="input-row">
          <input type="number" id="breakDur" min="1" step="1" value="10" inputmode="numeric">
          <div class="unit-toggle" id="breakUnit">
            <button data-unit="sec" class="sel">sec</button>
            <button data-unit="min">min</button>
          </div>
        </div>
      </div>

      <button class="btn start" id="startBtn">Start</button>
    </div>
    <p class="hint">Audio cues play on every transition &mdash; turn your volume up.<br>
    Cues keep playing if you switch apps or lock the screen.</p>
  </div>

  <!-- TIMER SCREEN -->
  <div id="timerScreen" class="screen">
    <div class="card">
      <div class="rotation-badge">Rotation <b id="rotationNum">1</b> &nbsp;·&nbsp; Completed: <b id="completedNum">0</b></div>
      <div class="phase-label" id="phaseLabel">Workout 1</div>
      <div class="phase-sub" id="phaseSub">of 3 workouts</div>
      <div class="countdown" id="countdown">00:30</div>
      <div class="progress"><div class="progress-bar" id="progressBar"></div></div>
      <div class="btn-row">
        <button class="btn btn-secondary" id="pauseBtn">Pause</button>
        <button class="btn btn-danger" id="resetBtn">Reset</button>
      </div>
      <p class="hint" id="nextHint"></p>
    </div>
  </div>

<script>
(function () {
  "use strict";

  // ---------- DOM ----------
  var setupScreen   = document.getElementById('setupScreen');
  var timerScreen   = document.getElementById('timerScreen');
  var numWorkoutsEl = document.getElementById('numWorkouts');
  var workDurEl     = document.getElementById('workDur');
  var breakDurEl    = document.getElementById('breakDur');
  var workUnitEl    = document.getElementById('workUnit');
  var breakUnitEl   = document.getElementById('breakUnit');
  var startBtn      = document.getElementById('startBtn');

  var rotationNumEl  = document.getElementById('rotationNum');
  var completedNumEl = document.getElementById('completedNum');
  var phaseLabelEl   = document.getElementById('phaseLabel');
  var phaseSubEl     = document.getElementById('phaseSub');
  var countdownEl    = document.getElementById('countdown');
  var progressBarEl  = document.getElementById('progressBar');
  var pauseBtn       = document.getElementById('pauseBtn');
  var resetBtn       = document.getElementById('resetBtn');
  var nextHintEl     = document.getElementById('nextHint');

  // ---------- Unit toggles ----------
  var workUnit = 'sec', breakUnit = 'sec';
  function wireToggle(container, setter) {
    container.addEventListener('click', function (e) {
      var btn = e.target.closest('button');
      if (!btn) return;
      Array.prototype.forEach.call(container.children, function (c) { c.classList.remove('sel'); });
      btn.classList.add('sel');
      setter(btn.getAttribute('data-unit'));
    });
  }
  wireToggle(workUnitEl,  function (u) { workUnit = u; });
  wireToggle(breakUnitEl, function (u) { breakUnit = u; });

  // ---------- Audio (Web Audio API) ----------
  // Strategy for background playback: the timer is fully deterministic, so we
  // pre-schedule every upcoming beep on the Web Audio clock. Scheduled tones
  // play on the audio thread and keep firing even when the page is backgrounded
  // and JS is frozen. A silent looping source keeps the audio session alive.
  var audioCtx = null;
  var keepAliveSrc = null;
  var scheduledNodes = new Set();   // entries: { osc, gain }
  var HORIZON = 3600;               // seconds of cues to pre-schedule
  var MAX_EVENTS = 1500;            // safety cap on scheduled nodes

  function ensureAudio() {
    if (!audioCtx) {
      var AC = window.AudioContext || window.webkitAudioContext;
      if (AC) audioCtx = new AC();
      startKeepAlive();
    }
    if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
  }

  function startKeepAlive() {
    if (!audioCtx || keepAliveSrc) return;
    try {
      // 1 second of pure silence, looped forever -> keeps the context "running"
      var buf = audioCtx.createBuffer(1, audioCtx.sampleRate, audioCtx.sampleRate);
      var src = audioCtx.createBufferSource();
      src.buffer = buf;
      src.loop = true;
      var g = audioCtx.createGain();
      g.gain.value = 0;
      src.connect(g);
      g.connect(audioCtx.destination);
      src.start();
      keepAliveSrc = src;
    } catch (e) {}
  }

  // Schedule one tone at an absolute AudioContext time.
  function toneAt(freq, duration, type, when, volume) {
    if (!audioCtx) return;
    var t0 = when;
    var osc = audioCtx.createOscillator();
    var gain = audioCtx.createGain();
    osc.type = type || 'sine';
    osc.frequency.value = freq;
    var vol = volume == null ? 0.35 : volume;
    gain.gain.setValueAtTime(0.0001, t0);
    gain.gain.exponentialRampToValueAtTime(vol, t0 + 0.01);
    gain.gain.exponentialRampToValueAtTime(0.0001, t0 + duration);
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.start(t0);
    osc.stop(t0 + duration + 0.05);
    var entry = { osc: osc, gain: gain };
    scheduledNodes.add(entry);
    osc.onended = function () {
      try { osc.disconnect(); gain.disconnect(); } catch (e) {}
      scheduledNodes.delete(entry);
    };
  }

  // Cue families (each takes an absolute ctx start time)
  function cueWorkStart(when) {                 // workout begins: rising double beep
    toneAt(660, 0.12, 'square', when, 0.3);
    toneAt(990, 0.15, 'square', when + 0.14, 0.3);
  }
  function cueBreak(when) {                      // break begins: single beep
    toneAt(880, 0.15, 'sine', when, 0.35);
  }
  function cueFanfare(when) {                    // full rotation complete: ascending C-E-G-C
    var notes = [523.25, 659.25, 783.99, 1046.5];
    for (var i = 0; i < notes.length; i++) toneAt(notes[i], 0.28, 'triangle', when + i * 0.16, 0.4);
  }

  // Silence every scheduled cue (used on pause/reset/reschedule). We can't call
  // stop() twice, so we mute the gain instead; the nodes still stop on schedule.
  function clearScheduled() {
    if (!audioCtx) { scheduledNodes.clear(); return; }
    var now = audioCtx.currentTime;
    scheduledNodes.forEach(function (entry) {
      try {
        entry.gain.gain.cancelScheduledValues(now);
        entry.gain.gain.setValueAtTime(0.0001, now);
      } catch (e) {}
    });
    scheduledNodes.clear();
  }

  // ---------- Timer state (wall-clock anchored) ----------
  var state = {
    numWorkouts: 3,
    workSec: 30,
    breakSec: 10,
    pdArr: [],          // phase durations for one rotation: [work, break, work, break, ...]
    cycleLen: 0,        // seconds in one full rotation
    elapsedBase: 0,     // elapsed seconds accumulated before the current running segment
    startPerf: 0,       // performance.now() when the current running segment began
    running: false,
    paused: false,
    rafId: null
  };

  function buildDurations() {
    var arr = [];
    for (var i = 0; i < state.numWorkouts; i++) {
      arr.push(state.workSec);
      arr.push(state.breakSec);
    }
    return arr;
  }

  function currentElapsed() {
    if (!state.running || state.paused) return state.elapsedBase;
    return state.elapsedBase + (performance.now() - state.startPerf) / 1000;
  }

  // Resolve which phase a given elapsed time falls in.
  function phaseAt(E) {
    var arr = state.pdArr, L = arr.length, cyc = state.cycleLen;
    var r = Math.floor(E / cyc);
    var rem = E - r * cyc;
    var acc = 0, li = 0;
    for (li = 0; li < L; li++) {
      if (rem < acc + arr[li]) break;
      acc += arr[li];
    }
    if (li >= L) { li = L - 1; acc = cyc - arr[li]; }
    var startAbs = r * cyc + acc;
    var dur = arr[li];
    return {
      rotation: r + 1,
      completed: r,
      globalIndex: r * L + li,
      isWork: (li % 2 === 0),
      workoutNumber: Math.floor(li / 2) + 1,
      duration: dur,
      remaining: Math.max(0, (startAbs + dur) - E),
      phaseEndAbs: startAbs + dur
    };
  }

  function fmt(totalSeconds) {
    var s = Math.max(0, Math.ceil(totalSeconds - 1e-6));
    var m = Math.floor(s / 60);
    var ss = s % 60;
    return (m < 10 ? '0' : '') + m + ':' + (ss < 10 ? '0' : '') + ss;
  }

  function nextHintText(p) {
    if (p.isWork) return 'Up next: Break';
    if (p.workoutNumber < state.numWorkouts) return 'Up next: Workout ' + (p.workoutNumber + 1);
    return 'Up next: Rotation ' + (p.rotation + 1) + ' — Workout 1';
  }

  // Pre-schedule all transition cues within the horizon, starting from elapsed
  // value fromE (which must correspond to "now").
  function scheduleCues(fromE) {
    if (!audioCtx) return;
    clearScheduled();
    var arr = state.pdArr, L = arr.length;
    var ctxNow = audioCtx.currentTime;
    var cur = phaseAt(fromE);
    var gi = cur.globalIndex + 1;        // index of phase that STARTS at next boundary
    var boundaryAbs = cur.phaseEndAbs;   // elapsed seconds at that boundary
    var count = 0;
    while ((boundaryAbs - fromE) <= HORIZON && count < MAX_EVENTS) {
      var when = ctxNow + (boundaryAbs - fromE);
      if (when > ctxNow + 0.02) {
        var li = ((gi % L) + L) % L;
        if (li === 0)            cueFanfare(when);   // new rotation begins
        else if (li % 2 === 0)   cueWorkStart(when); // workout begins
        else                     cueBreak(when);     // break begins
        boundaryAbs += arr[li];
      } else {
        boundaryAbs += arr[((gi % L) + L) % L];
      }
      gi += 1;
      count += 1;
    }
  }

  // ---------- Rendering ----------
  function render() {
    var p = phaseAt(currentElapsed());
    rotationNumEl.textContent = p.rotation;
    completedNumEl.textContent = p.completed;
    if (p.isWork) {
      phaseLabelEl.textContent = 'Workout ' + p.workoutNumber;
      phaseSubEl.textContent = 'of ' + state.numWorkouts + ' workouts';
    } else {
      phaseLabelEl.textContent = 'Break';
      phaseSubEl.textContent = (p.workoutNumber < state.numWorkouts)
        ? 'next: Workout ' + (p.workoutNumber + 1)
        : 'finishing rotation';
    }
    countdownEl.textContent = fmt(p.remaining);
    var pct = p.duration > 0 ? (p.remaining / p.duration) * 100 : 0;
    progressBarEl.style.width = Math.max(0, Math.min(100, pct)) + '%';
    nextHintEl.textContent = nextHintText(p);
    document.body.classList.toggle('work', p.isWork);
    document.body.classList.toggle('break', !p.isWork);
  }

  function tick() {
    if (!state.running) return;
    if (!state.paused) render();
    state.rafId = requestAnimationFrame(tick);
  }

  // ---------- Wake Lock (keeps screen on while in foreground) ----------
  var wakeLock = null;
  function requestWakeLock() {
    try {
      if ('wakeLock' in navigator && document.visibilityState === 'visible') {
        navigator.wakeLock.request('screen').then(function (wl) {
          wakeLock = wl;
        }).catch(function () {});
      }
    } catch (e) {}
  }
  function releaseWakeLock() {
    try { if (wakeLock) { wakeLock.release(); wakeLock = null; } } catch (e) {}
  }

  // ---------- Controls ----------
  function startTimer() {
    var n = parseInt(numWorkoutsEl.value, 10);
    var w = parseFloat(workDurEl.value);
    var b = parseFloat(breakDurEl.value);

    if (!n || n < 1) { alert('Enter at least 1 workout per rotation.'); return; }
    if (!w || w <= 0) { alert('Enter a valid workout duration.'); return; }
    if (!b || b <= 0) { alert('Enter a valid break duration.'); return; }

    state.numWorkouts = Math.floor(n);
    state.workSec  = Math.round(workUnit  === 'min' ? w * 60 : w);
    state.breakSec = Math.round(breakUnit === 'min' ? b * 60 : b);
    state.pdArr = buildDurations();
    state.cycleLen = state.pdArr.reduce(function (a, c) { return a + c; }, 0);
    state.elapsedBase = 0;
    state.startPerf = performance.now();
    state.running = true;
    state.paused = false;

    ensureAudio();

    setupScreen.classList.remove('active');
    timerScreen.classList.add('active');
    pauseBtn.textContent = 'Pause';
    document.body.classList.remove('paused');

    requestWakeLock();
    if (audioCtx) cueWorkStart(audioCtx.currentTime + 0.05); // beep for workout 1
    scheduleCues(0);
    render();

    cancelAnimationFrame(state.rafId);
    state.rafId = requestAnimationFrame(tick);
  }

  function togglePause() {
    if (!state.running) return;
    if (!state.paused) {
      // pausing
      state.elapsedBase = currentElapsed();
      state.paused = true;
      clearScheduled();
      pauseBtn.textContent = 'Resume';
      document.body.classList.add('paused');
      releaseWakeLock();
    } else {
      // resuming
      ensureAudio();
      state.startPerf = performance.now();
      state.paused = false;
      pauseBtn.textContent = 'Pause';
      document.body.classList.remove('paused');
      requestWakeLock();
      scheduleCues(state.elapsedBase);
      render();
    }
  }

  function reset() {
    state.running = false;
    state.paused = false;
    cancelAnimationFrame(state.rafId);
    clearScheduled();
    releaseWakeLock();
    document.body.classList.remove('work', 'break', 'paused');
    timerScreen.classList.remove('active');
    setupScreen.classList.add('active');
  }

  // ---------- Background / foreground handling ----------
  document.addEventListener('visibilitychange', function () {
    if (document.visibilityState === 'visible' && state.running && !state.paused) {
      // Re-sync the display to real elapsed time and refill the cue horizon.
      ensureAudio();
      scheduleCues(currentElapsed());
      render();
      requestWakeLock();
    }
  });

  // ---------- Events ----------
  startBtn.addEventListener('click', startTimer);
  pauseBtn.addEventListener('click', togglePause);
  resetBtn.addEventListener('click', reset);

  document.addEventListener('keydown', function (e) {
    if (e.code === 'Space' && timerScreen.classList.contains('active')) {
      e.preventDefault();
      togglePause();
    }
  });
})();
</script>
</body>
</html>
