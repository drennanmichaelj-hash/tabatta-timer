<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Tabata Timer</title>
<style>
  :root {
    --bg: #0d1117;
    --panel: #161b22;
    --panel-2: #1c2430;
    --text: #e6edf3;
    --muted: #8b949e;
    --accent: #3fb950;
    --accent-2: #2ea043;
    --break: #58a6ff;
    --rest-glow: rgba(88,166,255,0.25);
    --work-glow: rgba(63,185,80,0.25);
    --danger: #f85149;
    --border: #30363d;
  }

  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 20px;
    transition: background 0.4s ease;
  }

  .screen {
    width: 100%;
    max-width: 460px;
    display: none;
  }
  .screen.active { display: block; }

  h1 {
    text-align: center;
    font-size: 1.8rem;
    margin: 0 0 4px;
    letter-spacing: 0.5px;
  }
  .subtitle {
    text-align: center;
    color: var(--muted);
    margin: 0 0 28px;
    font-size: 0.95rem;
  }

  .card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 22px;
  }

  .field { margin-bottom: 20px; }
  .field:last-child { margin-bottom: 0; }

  label {
    display: block;
    font-size: 0.9rem;
    color: var(--muted);
    margin-bottom: 8px;
    font-weight: 600;
  }

  .input-row {
    display: flex;
    gap: 10px;
  }

  input[type="number"] {
    flex: 1;
    background: var(--panel-2);
    border: 1px solid var(--border);
    color: var(--text);
    font-size: 1.2rem;
    padding: 14px;
    border-radius: 10px;
    width: 100%;
    outline: none;
    transition: border-color 0.2s;
    -moz-appearance: textfield;
  }
  input[type="number"]:focus { border-color: var(--accent); }
  input::-webkit-outer-spin-button,
  input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }

  .unit-toggle {
    display: flex;
    background: var(--panel-2);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
  }
  .unit-toggle button {
    background: transparent;
    border: none;
    color: var(--muted);
    padding: 0 16px;
    font-size: 0.9rem;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.2s, color 0.2s;
  }
  .unit-toggle button.sel {
    background: var(--accent);
    color: #08130b;
  }

  .btn {
    width: 100%;
    border: none;
    border-radius: 12px;
    padding: 18px;
    font-size: 1.1rem;
    font-weight: 700;
    cursor: pointer;
    transition: transform 0.08s, background 0.2s, opacity 0.2s;
    color: #08130b;
    background: var(--accent);
  }
  .btn:active { transform: scale(0.98); }
  .btn.start { margin-top: 24px; }

  .btn-row {
    display: flex;
    gap: 12px;
    margin-top: 28px;
  }
  .btn-secondary {
    background: var(--panel-2);
    color: var(--text);
    border: 1px solid var(--border);
  }
  .btn-danger {
    background: transparent;
    color: var(--danger);
    border: 1px solid var(--danger);
  }

  /* Timer screen */
  #timerScreen .card {
    text-align: center;
    padding: 30px 22px;
  }

  .rotation-badge {
    display: inline-block;
    background: var(--panel-2);
    border: 1px solid var(--border);
    border-radius: 999px;
    padding: 8px 18px;
    font-size: 0.95rem;
    color: var(--muted);
    margin-bottom: 22px;
  }
  .rotation-badge b {
    color: var(--text);
    font-size: 1.1rem;
  }

  .phase-label {
    font-size: 2rem;
    font-weight: 800;
    margin: 0 0 6px;
    letter-spacing: 1px;
    transition: color 0.3s;
  }
  .phase-sub {
    color: var(--muted);
    margin: 0 0 18px;
    font-size: 0.9rem;
    min-height: 1.2em;
  }

  .countdown {
    font-size: 6rem;
    font-weight: 800;
    font-variant-numeric: tabular-nums;
    line-height: 1;
    margin: 10px 0 22px;
    letter-spacing: 2px;
  }

  .progress {
    height: 8px;
    background: var(--panel-2);
    border-radius: 999px;
    overflow: hidden;
    margin-bottom: 6px;
  }
  .progress-bar {
    height: 100%;
    width: 100%;
    background: var(--accent);
    border-radius: 999px;
    transition: width 0.25s linear, background 0.3s;
  }

  /* phase theming */
  body.work .countdown, body.work .phase-label { color: var(--accent); }
  body.break .countdown, body.break .phase-label { color: var(--break); }
  body.work .progress-bar { background: var(--accent); }
  body.break .progress-bar { background: var(--break); }
  body.work .card { box-shadow: 0 0 50px var(--work-glow); }
  body.break .card { box-shadow: 0 0 50px var(--rest-glow); }
  body.paused .countdown { opacity: 0.45; }

  .hint {
    text-align: center;
    color: var(--muted);
    font-size: 0.8rem;
    margin-top: 18px;
    line-height: 1.5;
  }

  @media (max-width: 380px) {
    .countdown { font-size: 4.5rem; }
    .phase-label { font-size: 1.6rem; }
  }
</style>
</head>
<body>

  <!-- SETUP SCREEN -->
  <div id="setupScreen" class="screen active">
    <h1>Tabata Timer</h1>
    <p class="subtitle">Set it up, hit start, keep moving.</p>
    <div class="card">
      <div class="field">
        <label for="numWorkouts">Workouts per rotation</label>
        <div class="input-row">
          <input type="number" id="numWorkouts" min="1" step="1" value="3" inputmode="numeric">
        </div>
      </div>

      <div class="field">
        <label for="workDur">Workout duration</label>
        <div class="input-row">
          <input type="number" id="workDur" min="1" step="1" value="30" inputmode="numeric">
          <div class="unit-toggle" id="workUnit">
            <button data-unit="sec" class="sel">sec</button>
            <button data-unit="min">min</button>
          </div>
        </div>
      </div>

      <div class="field">
        <label for="breakDur">Break duration</label>
        <div class="input-row">
          <input type="number" id="breakDur" min="1" step="1" value="10" inputmode="numeric">
          <div class="unit-toggle" id="breakUnit">
            <button data-unit="sec" class="sel">sec</button>
            <button data-unit="min">min</button>
          </div>
        </div>
      </div>

      <button class="btn start" id="startBtn">Start</button>
    </div>
    <p class="hint">Audio cues play on every transition &mdash; turn your volume up.<br>
    Cues keep playing if you switch apps or lock the screen.</p>
  </div>

  <!-- TIMER SCREEN -->
  <div id="timerScreen" class="screen">
    <div class="card">
      <div class="rotation-badge">Rotation <b id="rotationNum">1</b> &nbsp;·&nbsp; Completed: <b id="completedNum">0</b></div>
      <div class="phase-label" id="phaseLabel">Workout 1</div>
      <div class="phase-sub" id="phaseSub">of 3 workouts</div>
      <div class="countdown" id="countdown">00:30</div>
      <div class="progress"><div class="progress-bar" id="progressBar"></div></div>
      <div class="btn-row">
        <button class="btn btn-secondary" id="pauseBtn">Pause</button>
        <button class="btn btn-danger" id="resetBtn">Reset</button>
      </div>
      <p class="hint" id="nextHint"></p>
    </div>
  </div>

<script>
(function () {
  "use strict";

  // ---------- DOM ----------
  var setupScreen   = document.getElementById('setupScreen');
  var timerScreen   = document.getElementById('timerScreen');
  var numWorkoutsEl = document.getElementById('numWorkouts');
  var workDurEl     = document.getElementById('workDur');
  var breakDurEl    = document.getElementById('breakDur');
  var workUnitEl    = document.getElementById('workUnit');
  var breakUnitEl   = document.getElementById('breakUnit');
  var startBtn      = document.getElementById('startBtn');

  var rotationNumEl  = document.getElementById('rotationNum');
  var completedNumEl = document.getElementById('completedNum');
  var phaseLabelEl   = document.getElementById('phaseLabel');
  var phaseSubEl     = document.getElementById('phaseSub');
  var countdownEl    = document.getElementById('countdown');
  var progressBarEl  = document.getElementById('progressBar');
  var pauseBtn       = document.getElementById('pauseBtn');
  var resetBtn       = document.getElementById('resetBtn');
  var nextHintEl     = document.getElementById('nextHint');

  // ---------- Unit toggles ----------
  var workUnit = 'sec', breakUnit = 'sec';
  function wireToggle(container, setter) {
    container.addEventListener('click', function (e) {
      var btn = e.target.closest('button');
      if (!btn) return;
      Array.prototype.forEach.call(container.children, function (c) { c.classList.remove('sel'); });
      btn.classList.add('sel');
      setter(btn.getAttribute('data-unit'));
    });
  }
  wireToggle(workUnitEl,  function (u) { workUnit = u; });
  wireToggle(breakUnitEl, function (u) { breakUnit = u; });

  // ---------- Audio (background-safe via a looping media element) ----------
  // Mobile browsers SUSPEND the Web Audio API the moment the page is
  // backgrounded, so live-scheduled beeps go silent off-screen. An <audio>
  // media element, however, keeps playing in the background. Because every
  // rotation is identical, we render one rotation's worth of beeps (offline)
  // into a single WAV track and loop it, kept in sync with the timeline.
  var audioEl = null;
  var audioURL = null;
  var BASE_SR = 16000;          // sample rate for the rendered track
  var MAX_SAMPLES = 8000000;    // cap track size (~16 MB) for very long rotations

  function ensureAudioEl() {
    if (!audioEl) {
      audioEl = new Audio();
      audioEl.loop = true;
      audioEl.preload = 'auto';
      audioEl.setAttribute('playsinline', '');
    }
  }

  // Must run inside a user gesture: starts a looping silent clip so the OS
  // grants this element background-audio permission before the real track loads.
  function unlockAudio() {
    ensureAudioEl();
    try {
      if (!audioEl.src) {
        audioURL = encodeWAVURL(new Float32Array(Math.floor(BASE_SR * 0.05)), BASE_SR);
        audioEl.src = audioURL;
      }
      audioEl.loop = true;
      var p = audioEl.play();
      if (p && p.catch) p.catch(function () {});
    } catch (e) {}
  }

  // Encode mono Float32 PCM samples into a WAV object URL.
  function encodeWAVURL(samples, sr) {
    var len = samples.length;
    var dataSize = len * 2;
    var ab = new ArrayBuffer(44 + dataSize);
    var dv = new DataView(ab);
    function wstr(off, s) { for (var i = 0; i < s.length; i++) dv.setUint8(off + i, s.charCodeAt(i)); }
    wstr(0, 'RIFF'); dv.setUint32(4, 36 + dataSize, true); wstr(8, 'WAVE');
    wstr(12, 'fmt '); dv.setUint32(16, 16, true); dv.setUint16(20, 1, true); dv.setUint16(22, 1, true);
    dv.setUint32(24, sr, true); dv.setUint32(28, sr * 2, true); dv.setUint16(32, 2, true); dv.setUint16(34, 16, true);
    wstr(36, 'data'); dv.setUint32(40, dataSize, true);
    var off = 44;
    for (var i = 0; i < len; i++) {
      var s = Math.max(-1, Math.min(1, samples[i]));
      dv.setInt16(off, s < 0 ? s * 0x8000 : s * 0x7FFF, true);
      off += 2;
    }
    return URL.createObjectURL(new Blob([ab], { type: 'audio/wav' }));
  }

  // --- Offline tone rendering (used only to build the looping track) ---
  function renderTone(ctx, freq, duration, type, when, volume) {
    var osc = ctx.createOscillator();
    var gain = ctx.createGain();
    osc.type = type || 'sine';
    osc.frequency.value = freq;
    var vol = volume == null ? 0.35 : volume;
    gain.gain.setValueAtTime(0.0001, when);
    gain.gain.exponentialRampToValueAtTime(vol, when + 0.01);
    gain.gain.exponentialRampToValueAtTime(0.0001, when + duration);
    osc.connect(gain); gain.connect(ctx.destination);
    osc.start(when); osc.stop(when + duration + 0.05);
  }
  function renderWorkStart(ctx, when) {            // workout begins: rising double beep
    renderTone(ctx, 660, 0.12, 'square', when, 0.3);
    renderTone(ctx, 990, 0.15, 'square', when + 0.14, 0.3);
  }
  function renderBreak(ctx, when) {                 // break begins: single beep
    renderTone(ctx, 880, 0.15, 'sine', when, 0.35);
  }
  function renderFanfare(ctx, when) {               // rotation complete: ascending C-E-G-C
    var notes = [523.25, 659.25, 783.99, 1046.5];
    for (var i = 0; i < notes.length; i++) renderTone(ctx, notes[i], 0.28, 'triangle', when + i * 0.16, 0.4);
  }

  // Build the looping rotation track and hand it to the audio element.
  function buildRotationTrack(done) {
    var OAC = window.OfflineAudioContext || window.webkitOfflineAudioContext;
    if (!OAC) { done(false); return; }
    var cycleLen = state.cycleLen;
    var step = state.workSec + state.breakSec;
    var sr = BASE_SR;
    if (cycleLen * sr > MAX_SAMPLES) sr = Math.max(8000, Math.floor(MAX_SAMPLES / cycleLen));
    var frames = Math.max(1, Math.ceil(cycleLen * sr));
    var ctx;
    try { ctx = new OAC(1, frames, sr); } catch (e) { done(false); return; }

    for (var i = 0; i < state.numWorkouts; i++) {
      var wStart = i * step;
      renderWorkStart(ctx, wStart + 0.0005);        // start of each workout
      var bStart = wStart + state.workSec;
      if (bStart < cycleLen) renderBreak(ctx, bStart); // start of each break
    }
    // Rotation-complete fanfare lands at the loop boundary; the next loop's
    // workout-1 beep follows immediately, marking the new rotation.
    var fanfareLen = 0.8;
    renderFanfare(ctx, Math.max(0, cycleLen - fanfareLen));

    ctx.startRendering().then(function (buf) {
      var url = encodeWAVURL(buf.getChannelData(0), buf.sampleRate);
      if (audioURL) { try { URL.revokeObjectURL(audioURL); } catch (e) {} }
      audioURL = url;
      ensureAudioEl();
      audioEl.src = url;
      audioEl.loop = true;
      done(true);
    }).catch(function () { done(false); });
  }

  // --- Playback control synced to the timeline ---
  function audioSeekPlay(elapsed) {
    if (!audioEl) return;
    try { audioEl.currentTime = state.cycleLen > 0 ? (elapsed % state.cycleLen) : 0; } catch (e) {}
    var p = audioEl.play();
    if (p && p.catch) p.catch(function () {});
  }
  function audioResync(elapsed) {
    if (!audioEl || audioEl.paused || state.cycleLen <= 0) return;
    var target = elapsed % state.cycleLen;
    if (Math.abs(audioEl.currentTime - target) > 0.5) {
      try { audioEl.currentTime = target; } catch (e) {}
    }
  }
  function audioStop() { if (audioEl) { try { audioEl.pause(); } catch (e) {} } }

  // --- MediaSession: lock-screen controls + helps keep playback alive ---
  function setupMediaSession() {
    if (!('mediaSession' in navigator)) return;
    try {
      navigator.mediaSession.metadata = new MediaMetadata({
        title: 'Tabata Timer', artist: 'Workout in progress'
      });
      navigator.mediaSession.setActionHandler('play', function () {
        if (state.running && state.paused) togglePause();
      });
      navigator.mediaSession.setActionHandler('pause', function () {
        if (state.running && !state.paused) togglePause();
      });
    } catch (e) {}
  }
  function setMediaState(s) {
    if ('mediaSession' in navigator) { try { navigator.mediaSession.playbackState = s; } catch (e) {} }
  }

  // ---------- Timer state (wall-clock anchored) ----------
  var state = {
    numWorkouts: 3,
    workSec: 30,
    breakSec: 10,
    pdArr: [],          // phase durations for one rotation: [work, break, work, break, ...]
    cycleLen: 0,        // seconds in one full rotation
    elapsedBase: 0,     // elapsed seconds accumulated before the current running segment
    startPerf: 0,       // performance.now() when the current running segment began
    running: false,
    paused: false,
    rafId: null
  };

  function buildDurations() {
    var arr = [];
    for (var i = 0; i < state.numWorkouts; i++) {
      arr.push(state.workSec);
      arr.push(state.breakSec);
    }
    return arr;
  }

  function currentElapsed() {
    if (!state.running || state.paused) return state.elapsedBase;
    return state.elapsedBase + (performance.now() - state.startPerf) / 1000;
  }

  // Resolve which phase a given elapsed time falls in.
  function phaseAt(E) {
    var arr = state.pdArr, L = arr.length, cyc = state.cycleLen;
    var r = Math.floor(E / cyc);
    var rem = E - r * cyc;
    var acc = 0, li = 0;
    for (li = 0; li < L; li++) {
      if (rem < acc + arr[li]) break;
      acc += arr[li];
    }
    if (li >= L) { li = L - 1; acc = cyc - arr[li]; }
    var startAbs = r * cyc + acc;
    var dur = arr[li];
    return {
      rotation: r + 1,
      completed: r,
      isWork: (li % 2 === 0),
      workoutNumber: Math.floor(li / 2) + 1,
      duration: dur,
      remaining: Math.max(0, (startAbs + dur) - E)
    };
  }

  function fmt(totalSeconds) {
    var s = Math.max(0, Math.ceil(totalSeconds - 1e-6));
    var m = Math.floor(s / 60);
    var ss = s % 60;
    return (m < 10 ? '0' : '') + m + ':' + (ss < 10 ? '0' : '') + ss;
  }

  function nextHintText(p) {
    if (p.isWork) return 'Up next: Break';
    if (p.workoutNumber < state.numWorkouts) return 'Up next: Workout ' + (p.workoutNumber + 1);
    return 'Up next: Rotation ' + (p.rotation + 1) + ' — Workout 1';
  }

  // ---------- Rendering ----------
  function render() {
    var p = phaseAt(currentElapsed());
    rotationNumEl.textContent = p.rotation;
    completedNumEl.textContent = p.completed;
    if (p.isWork) {
      phaseLabelEl.textContent = 'Workout ' + p.workoutNumber;
      phaseSubEl.textContent = 'of ' + state.numWorkouts + ' workouts';
    } else {
      phaseLabelEl.textContent = 'Break';
      phaseSubEl.textContent = (p.workoutNumber < state.numWorkouts)
        ? 'next: Workout ' + (p.workoutNumber + 1)
        : 'finishing rotation';
    }
    countdownEl.textContent = fmt(p.remaining);
    var pct = p.duration > 0 ? (p.remaining / p.duration) * 100 : 0;
    progressBarEl.style.width = Math.max(0, Math.min(100, pct)) + '%';
    nextHintEl.textContent = nextHintText(p);
    document.body.classList.toggle('work', p.isWork);
    document.body.classList.toggle('break', !p.isWork);
  }

  function tick() {
    if (!state.running) return;
    if (!state.paused) render();
    state.rafId = requestAnimationFrame(tick);
  }

  // ---------- Wake Lock (keeps screen on while in foreground) ----------
  var wakeLock = null;
  function requestWakeLock() {
    try {
      if ('wakeLock' in navigator && document.visibilityState === 'visible') {
        navigator.wakeLock.request('screen').then(function (wl) {
          wakeLock = wl;
        }).catch(function () {});
      }
    } catch (e) {}
  }
  function releaseWakeLock() {
    try { if (wakeLock) { wakeLock.release(); wakeLock = null; } } catch (e) {}
  }

  // ---------- Controls ----------
  function startTimer() {
    var n = parseInt(numWorkoutsEl.value, 10);
    var w = parseFloat(workDurEl.value);
    var b = parseFloat(breakDurEl.value);

    if (!n || n < 1) { alert('Enter at least 1 workout per rotation.'); return; }
    if (!w || w <= 0) { alert('Enter a valid workout duration.'); return; }
    if (!b || b <= 0) { alert('Enter a valid break duration.'); return; }

    state.numWorkouts = Math.floor(n);
    state.workSec  = Math.round(workUnit  === 'min' ? w * 60 : w);
    state.breakSec = Math.round(breakUnit === 'min' ? b * 60 : b);
    state.pdArr = buildDurations();
    state.cycleLen = state.pdArr.reduce(function (a, c) { return a + c; }, 0);
    state.elapsedBase = 0;
    state.startPerf = performance.now();
    state.running = true;
    state.paused = false;

    // Unlock audio synchronously inside this click, then load the real track.
    unlockAudio();
    setupMediaSession();
    buildRotationTrack(function (ok) {
      if (ok && state.running && !state.paused) {
        audioSeekPlay(currentElapsed());
        setMediaState('playing');
      }
    });

    setupScreen.classList.remove('active');
    timerScreen.classList.add('active');
    pauseBtn.textContent = 'Pause';
    document.body.classList.remove('paused');

    requestWakeLock();
    render();
    cancelAnimationFrame(state.rafId);
    state.rafId = requestAnimationFrame(tick);
  }

  function togglePause() {
    if (!state.running) return;
    if (!state.paused) {
      // pausing
      state.elapsedBase = currentElapsed();
      state.paused = true;
      audioStop();
      setMediaState('paused');
      pauseBtn.textContent = 'Resume';
      document.body.classList.add('paused');
      releaseWakeLock();
    } else {
      // resuming
      state.startPerf = performance.now();
      state.paused = false;
      pauseBtn.textContent = 'Pause';
      document.body.classList.remove('paused');
      requestWakeLock();
      audioSeekPlay(state.elapsedBase);
      setMediaState('playing');
      render();
    }
  }

  function reset() {
    state.running = false;
    state.paused = false;
    cancelAnimationFrame(state.rafId);
    audioStop();
    setMediaState('none');
    releaseWakeLock();
    document.body.classList.remove('work', 'break', 'paused');
    timerScreen.classList.remove('active');
    setupScreen.classList.add('active');
  }

  // ---------- Background / foreground handling ----------
  document.addEventListener('visibilitychange', function () {
    if (document.visibilityState === 'visible' && state.running && !state.paused) {
      // Re-sync display and audio to real elapsed time after returning.
      render();
      audioResync(currentElapsed());
      requestWakeLock();
    }
  });

  // ---------- Events ----------
  startBtn.addEventListener('click', startTimer);
  pauseBtn.addEventListener('click', togglePause);
  resetBtn.addEventListener('click', reset);

  document.addEventListener('keydown', function (e) {
    if (e.code === 'Space' && timerScreen.classList.contains('active')) {
      e.preventDefault();
      togglePause();
    }
  });
})();
</script>
</body>
</html>
